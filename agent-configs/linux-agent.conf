<ossec_config>
  <!-- REQUIRED: replace 192.168.1.100 with your Wazuh manager's actual IP before deploying -->
  <client>
    <server>
      <address>192.168.1.100</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
  </client>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <rootcheck>
    <disabled>no</disabled>
  </rootcheck>
</ossec_config>